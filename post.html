<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){var t=localStorage.getItem("theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.setAttribute("data-theme","dark");}})();</script>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'sha256-5zA9ZD1ssmLd7bXJhPue2zkTtqtDU9UMtptg47QQ9Hg=' 'sha256-XqbVS4YORCWTwL37RzrpuXNMM5StpCb5SRo1KwkmOYA='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://buttondown.com;">
    <title>Post - Markus Dröws</title>
    <meta name="description" content="">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="/js/marked.min.js" defer></script>
    <script src="/js/purify.min.js" defer></script>
    <script src="/js/posts.js" defer></script>
    <script src="/js/components.js" defer></script>
    <script src="/script.js" defer></script>
    <link rel="stylesheet" href="/styles.css">
    <style>
        h1,
        h2 {
            font-family: 'Fira Code', monospace;
        }

        body,
        h3,
        h4,
        h5,
        h6,
        p,
        a,
        li {
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body>
    <header></header>

    <main id="main-content">
        <article id="post-content">
            <header class="post-header">
                <h1 id="post-headline"></h1>
                <div class="post-meta">
                    <span class="date">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="7" width="16" height="14" rx="2"></rect>
                            <path d="M16 3v4"></path>
                            <path d="M8 3v4"></path>
                            <path d="M4 11h16"></path>
                        </svg>
                        <time id="post-date"></time>
                    </span>
                    <span id="post-read-time" class="read-time"></span>
                </div>
            </header>
            <div id="post-body" class="markdown-content"></div>
        </article>
        <h2>Stay connected</h2>
        <section class="newsletter-box">
            <p>Get notified when I publish new posts. No spam, unsubscribe anytime.</p>
            <form action="https://buttondown.com/api/emails/embed-subscribe/markusword" method="post" target="_blank"
                class="newsletter-form">
                <input type="text" name="name" placeholder="Your Name">
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="submit" value="Subscribe">
            </form>
            <p class="newsletter-note">2× per month, pure signal, zero fluff.</p>
        </section>
        <div id="post-tags" class="post-tags"></div>
        <div class="share-section">
            <div class="share-buttons">
                <a href="#" class="share-btn" data-platform="x" title="Share on X">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4L20 20"></path>
                        <path d="M20 4L4 20"></path>
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="bluesky" title="Share on Bluesky">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12 12c-1.5-2.5-4.5-5.5-7-7-1-.6-2-.4-2 .7 0 1.2.3 4 .6 5 .7 2.2 3 3 5.3 2.7 -2.8.5-5.2 1.7-2 5 3.5 3.6 4.6-.7 5.1-2.7 .5 2 1.6 6.3 5.1 2.7 3.2-3.3.8-4.5-2-5 2.3.3 4.6-.5 5.3-2.7.3-1 .6-3.8.6-5 0-1.1-1-1.3-2-.7-2.5 1.5-5.5 4.5-7 7z" />
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="linkedin" title="Share on LinkedIn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="4" />
                        <path d="M8 11v5"></path>
                        <path d="M8 8v.01"></path>
                        <path d="M12 16v-5"></path>
                        <path d="M16 16v-3a2 2 0 1 0-4 0"></path>
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="whatsapp" title="Share on WhatsApp">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="facebook" title="Share on Facebook">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="telegram" title="Share on Telegram">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M9.04 15.47 8.9 19.2c.26 0 .37-.11.5-.24l2.4-2.3 4.97 3.64c.91.5 1.56.24 1.8-.84l3.26-15.3h.01c.3-1.4-.5-1.95-1.38-1.62L1.6 9.5c-1.34.52-1.32 1.27-.23 1.61l4.84 1.51L17.8 5.5c.54-.33 1.03-.15.62.18" />
                    </svg>
                </a>
                <a href="#" class="share-btn" data-platform="email" title="Share via Email">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="7" width="18" height="10" rx="2"></rect>
                        <path d="M3 7l9 6l9 -6"></path>
                    </svg>
                </a>
            </div>
        </div>
        <div class="post-nav-row">
            <a href="javascript:history.back()" class="back-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5"></path>
                    <path d="M11 6L5 12"></path>
                    <path d="M11 18L5 12"></path>
                </svg>
                Back
            </a>
            <div class="post-nav-links"></div>
        </div>
    </main>

    <footer></footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const post = await PostLoader.loadPostPage();
            if (post) {
                document.getElementById('post-headline').textContent = post.headline;
                document.getElementById('post-date').textContent = PostLoader.formatDate(post.date);
                document.getElementById('post-read-time').textContent = '- ' + post.readTime;
                document.getElementById('post-body').innerHTML = post.content;

                if (post.tags && post.tags.length > 0) {
                    const tagsContainer = document.getElementById('post-tags');
                    tagsContainer.innerHTML = post.tags.map(tag =>
                        `<a href="../tags/${encodeURIComponent(tag)}" class="tag">#${escapeHtml(tag)}</a>`
                    ).join('');
                }

                setupShareButtons(post);
                setupPostNavigation(post);
            } else {
                document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
            }
        });

        function setupShareButtons(post) {
            const baseUrl = PostLoader.getBaseUrl();
            const postUrl = `${baseUrl}/post/${post.year}/${post.month}/${post.slug}`;
            const shareText = `${post.headline}`;

            const platformUrls = {
                x: `https://twitter.com/intent/tweet?url=${encodeURIComponent(postUrl)}&text=${encodeURIComponent(shareText)}`,
                bluesky: `https://bsky.app/intent/compose?text=${encodeURIComponent(shareText + '\n' + postUrl)}`,
                linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(postUrl)}`,
                whatsapp: `https://wa.me/?text=${encodeURIComponent(shareText + '\n' + postUrl)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(postUrl)}`,
                telegram: `https://t.me/share/url?url=${encodeURIComponent(postUrl)}&text=${encodeURIComponent(shareText)}`,
                pinterest: `https://pinterest.com/pin/create/button/?url=${encodeURIComponent(postUrl)}&description=${encodeURIComponent(shareText)}`,
                email: `mailto:?subject=${encodeURIComponent(shareText)}&body=${encodeURIComponent(postUrl)}`
            };

            document.querySelectorAll('.share-btn').forEach(btn => {
                const platform = btn.dataset.platform;
                if (platformUrls[platform]) {
                    btn.href = platformUrls[platform];
                    btn.target = '_blank';
                    btn.rel = 'noopener noreferrer';
                }
            });
        }

        function setupPostNavigation(post) {
            const navContainer = document.querySelector('.post-nav-links');
            let navHtml = '';

            if (post.nextPost) {
                const nextTitle = escapeHtml(post.nextPost.headline.substring(0, 25));
                const nextTeaser = escapeHtml(post.nextPost.teaser || '');
                const nextHeadline = escapeHtml(post.nextPost.headline);
                navHtml += `<a href="/post/${escapeHtml(post.nextPost.year)}/${escapeHtml(post.nextPost.month)}/${escapeHtml(post.nextPost.slug)}" class="post-nav-link" title="${nextHeadline}" aria-label="${nextTeaser}">
                    <div>
                    <span class="post-nav-label">Next Post</span>
                    <span class="post-nav-title">${nextTitle}</span>
                    </div>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </a>`;
            }

            if (navHtml) {
                navContainer.innerHTML = navHtml;
            }
        }
    </script>

    <button class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 15l-6-6-6 6" />
        </svg>
    </button>
</body>

</html>
